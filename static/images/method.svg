<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" width="1100" height="460" font-family="'IBM Plex Mono', ui-monospace, monospace" role="img" aria-label="Vernata training pipeline: a LiDAR point cloud is split into two augmented views. A student network and a momentum-updated teacher network each encode a view; the student is trained to match the teacher's distribution via a self-distillation loss, with centering and stop-gradient on the teacher branch.">
  <defs>
    <linearGradient id="ramp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8B23A"/>
      <stop offset="50%" stop-color="#1F8A8C"/>
      <stop offset="100%" stop-color="#3B3170"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5C6B7A"/>
    </marker>
  </defs>

  <!-- ramp hairline -->
  <rect x="0" y="0" width="1100" height="4" fill="url(#ramp)"/>

  <!-- source point cloud -->
  <g transform="translate(40,180)">
    <rect x="0" y="0" width="150" height="120" rx="10" fill="none" stroke="#E4E8EC"/>
    <text x="75" y="-14" text-anchor="middle" font-size="15" fill="#5C6B7A">LiDAR scan</text>
    <circle cx="38" cy="44" r="3" fill="#E8B23A"/><circle cx="58" cy="36" r="3" fill="#E8B23A"/>
    <circle cx="78" cy="58" r="3" fill="#1F8A8C"/><circle cx="100" cy="48" r="3" fill="#1F8A8C"/>
    <circle cx="118" cy="70" r="3" fill="#3B3170"/><circle cx="48" cy="78" r="3" fill="#E8B23A"/>
    <circle cx="88" cy="86" r="3" fill="#1F8A8C"/><circle cx="116" cy="40" r="3" fill="#3B3170"/>
    <circle cx="66" cy="66" r="3" fill="#1F8A8C"/><circle cx="30" cy="60" r="3" fill="#E8B23A"/>
  </g>

  <!-- two views -->
  <path d="M192,212 C230,150 250,120 300,118" fill="none" stroke="#5C6B7A" marker-end="url(#arr)"/>
  <path d="M192,268 C230,330 250,360 300,362" fill="none" stroke="#5C6B7A" marker-end="url(#arr)"/>
  <g font-size="13" fill="#5C6B7A">
    <text x="232" y="150">aug. view 1</text>
    <text x="232" y="356">aug. view 2</text>
  </g>

  <!-- student -->
  <g transform="translate(305,80)">
    <rect x="0" y="0" width="190" height="80" rx="10" fill="none" stroke="#1F8A8C" stroke-width="2"/>
    <text x="95" y="36" text-anchor="middle" font-size="16" fill="#1F8A8C">Student</text>
    <text x="95" y="58" text-anchor="middle" font-size="13" fill="#5C6B7A">encoder + head</text>
  </g>
  <!-- teacher -->
  <g transform="translate(305,322)">
    <rect x="0" y="0" width="190" height="80" rx="10" fill="none" stroke="#3B3170" stroke-width="2"/>
    <text x="95" y="36" text-anchor="middle" font-size="16" fill="#3B3170">Teacher</text>
    <text x="95" y="58" text-anchor="middle" font-size="13" fill="#5C6B7A">EMA · stop-grad</text>
  </g>

  <!-- to projections -->
  <path d="M495,120 L560,120" fill="none" stroke="#5C6B7A" marker-end="url(#arr)"/>
  <path d="M495,362 L560,362" fill="none" stroke="#5C6B7A" marker-end="url(#arr)"/>

  <!-- softmax outputs -->
  <g transform="translate(562,86)">
    <rect x="0" y="0" width="120" height="68" rx="8" fill="none" stroke="#E4E8EC"/>
    <text x="60" y="-12" text-anchor="middle" font-size="13" fill="#5C6B7A">softmax</text>
    <rect x="16" y="44" width="10" height="12" fill="#1F8A8C"/><rect x="32" y="30" width="10" height="26" fill="#1F8A8C"/>
    <rect x="48" y="20" width="10" height="36" fill="#1F8A8C"/><rect x="64" y="38" width="10" height="18" fill="#1F8A8C"/>
    <rect x="80" y="46" width="10" height="10" fill="#1F8A8C"/><rect x="96" y="34" width="10" height="22" fill="#1F8A8C"/>
  </g>
  <g transform="translate(562,328)">
    <rect x="0" y="0" width="120" height="68" rx="8" fill="none" stroke="#E4E8EC"/>
    <text x="60" y="88" text-anchor="middle" font-size="13" fill="#5C6B7A">softmax · centering</text>
    <rect x="16" y="44" width="10" height="12" fill="#3B3170"/><rect x="32" y="28" width="10" height="28" fill="#3B3170"/>
    <rect x="48" y="18" width="10" height="38" fill="#3B3170"/><rect x="64" y="40" width="10" height="16" fill="#3B3170"/>
    <rect x="80" y="48" width="10" height="8" fill="#3B3170"/><rect x="96" y="32" width="10" height="24" fill="#3B3170"/>
  </g>

  <!-- loss -->
  <g transform="translate(760,196)">
    <rect x="0" y="0" width="150" height="88" rx="12" fill="none" stroke="url(#ramp)" stroke-width="2.5"/>
    <text x="75" y="40" text-anchor="middle" font-size="17" fill="#10192A">self-distill</text>
    <text x="75" y="64" text-anchor="middle" font-size="14" fill="#5C6B7A">cross-entropy</text>
  </g>
  <path d="M684,120 C720,150 730,180 758,212" fill="none" stroke="#5C6B7A" marker-end="url(#arr)"/>
  <path d="M684,362 C720,330 730,300 758,268" fill="none" stroke="#5C6B7A" marker-end="url(#arr)"/>

  <!-- EMA feedback -->
  <path d="M835,196 C870,150 720,40 400,72" fill="none" stroke="#3B3170" stroke-dasharray="5 5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="612" y="34" font-size="12" fill="#3B3170" opacity="0.85">gradient → student weights → EMA → teacher</text>
</svg>
